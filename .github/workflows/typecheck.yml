name: TypeScript Check
on: push
jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run tsc --noEmit and capture output
        run: |
          npx tsc --noEmit 2>&1 > /tmp/tsc-output.txt || true
          echo "--- TSC OUTPUT ---"
          cat /tmp/tsc-output.txt
          echo "--- END TSC OUTPUT ---"
      - name: Create issue with tsc output
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/tsc-output.txt', 'utf8');
            const title = `TSC errors for ${context.sha.substring(0, 7)}`;
            const body = '```\n' + output + '\n```';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['tsc-diagnostic']
            });
